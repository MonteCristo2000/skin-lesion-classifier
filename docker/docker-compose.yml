services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: skin-lesion-classifier:latest
    container_name: skin-lesion-api
    ports:
      - "8000:8000"
    volumes:
      - ../model/best_model.pth:/app/model/best_model.pth:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: skin-lesion-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped
    depends_on:
      - api

volumes:
  prometheus_data:
